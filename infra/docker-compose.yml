services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: docmap-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: docmap
      POSTGRES_USER: docmap
      POSTGRES_PASSWORD: docmap

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ../database/control_plane.sql:/docker-entrypoint-initdb.d/control_plane.sql
      - ../database/seed_scp_objects.sql:/docker-entrypoint-initdb.d/seed_scp_objects.sql

  app:
    build: ..
    container_name: docmap-app

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://docmap:docmap@postgres:5432/docmap
      OLLAMA_HOST: http://host.docker.internal:11434
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
      DB_RESET_ON_START: "1"

    volumes:
      - ..:/app

    working_dir: /app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

  control-ui:
    image: node:20
    container_name: docmap-control-ui
    depends_on:
      - app
    working_dir: /ui
    volumes:
      - ..:/app
    command: sh -c "cd /app/ui && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
