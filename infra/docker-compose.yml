services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: docmap-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: docmap
      POSTGRES_USER: docmap
      POSTGRES_PASSWORD: docmap

    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmap -d docmap"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ../database/control_plane.sql:/docker-entrypoint-initdb.d/control_plane.sql
      - ../database/seed_scp_objects.sql:/docker-entrypoint-initdb.d/seed_scp_objects.sql

  app:
    build: ..
    container_name: docmap-app

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://docmap:docmap@postgres:5432/docmap
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      OLLAMA_THINK_LEVEL: ${OLLAMA_THINK_LEVEL:-low}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-}
      EXTRACTOR_MODEL: ${EXTRACTOR_MODEL:-gpt-oss:20b}
      GEOCODER_MIN_INTERVAL_SECONDS: ${GEOCODER_MIN_INTERVAL_SECONDS:-1.1}
      GEOCODER_USER_AGENT: ${GEOCODER_USER_AGENT:-docmap-geocoder/0.1 (+https://github.com/docmap)}
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
      DB_RESET_ON_START: "0"
      DB_DROP_TABLES_ON_START: "0"
      DOCMAP_STAGE_ITEM_LIMIT: 8000
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      BIGQUERY_DATASET: ${BIGQUERY_DATASET:-}
      BIGQUERY_LOCATION: ${BIGQUERY_LOCATION:-}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json

    volumes:
      - ..:/app
      - ../secrets/gcp-sa.json:/secrets/gcp-sa.json:ro

    working_dir: /app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

  control-ui:
    image: node:20
    container_name: docmap-control-ui
    depends_on:
      - app
    working_dir: /ui
    volumes:
      - ..:/app
    command: sh -c "cd /app/ui && npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  presentation:
    build:
      context: ..
      dockerfile: Dockerfile.presentation
    container_name: docmap-presentation
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://docmap:docmap@postgres:5432/docmap
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
      DB_RESET_ON_START: "0"
      DB_DROP_TABLES_ON_START: "0"
    ports:
      - "8080:8080"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: docmap-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@docmap.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres_data:
  pgadmin_data:
